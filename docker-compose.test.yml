
services:
  app:
    container_name: frontend-capture-live
    image: bartek2k/capture-live-frontend:latest
    ports:
      - '8080:80'
    environment:
      VITE_APP_API_URL: 'http://api.bartlomiejcisek.online'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-capture-live.rule=Host(`bartlomiejcisek.online`)"
      - "traefik.http.routers.frontend-capture-live.entrypoints=websecure"  # Use HTTPS
      - "traefik.http.services.frontend-capture-live.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
